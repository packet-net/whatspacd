name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: whatspacd-linux-x64
          - os: macos-latest
            asset: whatspacd-macos-arm64
          - os: windows-latest
            asset: whatspacd-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/build.mjs
      - run: node scripts/package-sea.mjs
      - name: Stage asset
        shell: bash
        run: |
          mkdir -p out
          if [ -f dist/whatspacd.exe ]; then cp dist/whatspacd.exe "out/${{ matrix.asset }}"; else cp dist/whatspacd "out/${{ matrix.asset }}"; fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stamp manifest version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^version: .*/version: \"${tag}\"/" pdn-app.yaml
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cp pdn-app.yaml release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
